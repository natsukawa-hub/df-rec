<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>商談録音</title>
  <style>
    /* v0.7.1 見た目リフレッシュ（フラット・リファインド・ダーク）＝CSSのみ・DOM/ID/録音ロジック無改変 */
    :root{ --bg:#0e1521; --card:#182231; --line:rgba(255,255,255,.07); --fg:#eef4fb; --sub:#93a4b8;
           --accent:#22a45f; --accentd:#1a7d49; --stop:#e0484d; --warn:#f2b04a; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; min-height:100%; background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; -webkit-font-smoothing:antialiased; }
    .wrap{ max-width:520px; margin:0 auto; padding:22px 18px 44px; }
    .apphead{ display:flex; align-items:center; gap:9px; margin:2px 0 4px; }
    .brandmark{ width:26px; height:26px; border-radius:8px; background:var(--accent); color:#04140b;
      display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex:0 0 auto; }
    h1{ font-size:19px; font-weight:600; margin:0; letter-spacing:.02em; }
    .sales{ font-size:14px; color:var(--sub); margin:0 0 18px; }
    .sales b{ color:var(--fg); font-size:15px; font-weight:600; }
    .card{ background:var(--card); border:0.5px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px; }
    label{ display:block; font-size:12.5px; color:var(--sub); margin-bottom:7px; }
    input[type=text]{ width:100%; padding:14px; font-size:16px; border-radius:11px;
      border:0.5px solid #33465c; background:#0c131d; color:var(--fg); }
    input[type=text]:focus{ outline:none; border-color:var(--accent); }
    input:disabled{ opacity:.55; }
    .note{ font-size:12.5px; color:var(--sub); margin-top:12px; line-height:1.6; }
    .note.warnline{ color:var(--warn); }
    .btn{ width:100%; padding:18px; font-size:18px; font-weight:600; border:none;
      border-radius:14px; color:#fff; margin-top:14px; letter-spacing:.02em; transition:transform .08s ease, background .15s ease; }
    .btn:active{ transform:scale(.985); }
    .btn-start{ background:var(--accent); color:#04140b; }
    .btn-start:active{ background:var(--accentd); }
    .btn-stop{ background:var(--stop); }
    .btn:disabled{ opacity:.4; }
    .status{ text-align:center; margin:8px 0 4px; }
    .recpill{ display:inline-flex; align-items:center; gap:8px; font-size:13px; color:#ffd7d8;
      background:rgba(224,72,77,.14); border:0.5px solid rgba(224,72,77,.4); padding:5px 14px; border-radius:20px; margin-bottom:4px; }
    .rec-dot{ display:inline-block; width:9px; height:9px; border-radius:50%;
      background:var(--stop); vertical-align:middle; animation:blink 1.1s infinite; }
    @keyframes blink{ 50%{opacity:.25;} }
    .time{ font-size:46px; font-weight:600; letter-spacing:1px; font-variant-numeric:tabular-nums; margin:10px 0 2px; }
    .sub{ font-size:12.5px; color:var(--sub); margin-top:6px; line-height:1.55; }
    .stallwarn{ color:var(--warn); font-weight:600; margin-top:10px; }
    .hidden{ display:none !important; }
    #interrupt{ position:fixed; inset:0; background:rgba(198,40,40,.97); z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
    #interrupt .big{ font-size:30px; font-weight:800; margin-bottom:10px; text-align:center; }
    #interrupt .msg{ font-size:15px; opacity:.95; margin-bottom:28px; text-align:center; line-height:1.65; }
    #interrupt button{ width:100%; max-width:360px; padding:22px; font-size:21px; font-weight:700;
      border:none; border-radius:16px; background:#fff; color:var(--stop); }
    #toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
      background:#000c; color:#fff; padding:11px 17px; border-radius:22px; font-size:13px; max-width:90%; }
    .done{ background:rgba(34,164,95,.08); border:0.5px solid rgba(34,164,95,.4); border-radius:13px; padding:16px; font-size:14px; line-height:1.75; }
    .warnline{ color:var(--warn); }
    .cfgerr{ background:#2a1517; border:0.5px solid var(--stop); border-radius:13px; padding:14px; font-size:13px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="apphead"><span class="brandmark">DF</span><h1>商談録音</h1></div>
    <div class="sales" id="salesLine"></div>

    <div class="card cfgerr hidden" id="cfgCard"></div>

    <div class="card" id="setupCard">
      <label for="deal">案件名（任意）</label>
      <input type="text" id="deal" placeholder="例：〇〇株式会社 初回商談" autocomplete="off">
      <button class="btn btn-start" id="startBtn">● 録音開始</button>
      <div class="note">録音を始める前に、相手に録音の断りを入れてください。</div>
      <div class="note warnline hidden" id="wakeNote">
        ⚠️ この端末は画面常時ONに未対応です。録音中は端末の自動ロックを手動でOFFにしてください。
      </div>
    </div>

    <div class="card hidden" id="recCard">
      <div class="status">
        <div class="recpill"><span class="rec-dot"></span><span id="recLabel">録音中</span></div>
        <div class="time" id="time">00:00</div>
        <div class="sub" id="progress">送信済み 0 / 0 チャンク</div>
        <div class="sub" id="netnote"></div>
        <div class="sub stallwarn hidden" id="stallnote"></div>
        <div class="sub" style="color:var(--warn)">📱 画面はこのまま点けたままに（画面を消す・他アプリに移るとその間は録音されません）</div>
      </div>
      <button class="btn btn-stop" id="stopBtn">■ 録音停止</button>
    </div>

    <div class="card hidden" id="doneCard">
      <div class="done" id="doneMsg"></div>
      <button class="btn btn-start" id="againBtn" style="margin-top:16px;">新しい録音を始める</button>
    </div>
  </div>

  <div id="interrupt" class="hidden">
    <div class="big">⚠️ 録音停止中</div>
    <div class="msg">録音が中断されました。<b>自動で再開を試みています…</b><br>すぐに戻らない場合は下のボタンを押してください（ここまでの分は保存済み）。<br><b>画面を消す・他アプリに移ると、その間は録音されません。</b></div>
    <button id="resumeBtn">録音を再開する</button>
  </div>

  <div id="toast" class="hidden"></div>

  <script>
    // CLIENT_VERSION v0.7.2 stall-resilience（2026-07-23）＝中断の自動再開＋中断スパン整形（coverage正直化）＋watchdog高速化＋mute猶予＋audioSessionフック
    //   背景：iOS26で画面ON・前面でもMediaRecorderが約90秒stallし（2026-07-22 阿部）、検知遅延の死に区間が誰にも説明されず
    //   silent_gap＝終端incompleteに落ちる構造穴があった。設計正本＝design_v0.7.2_stall-resilience.md
    // ================== 設定（デプロイ時にここだけ書き換える） ==================
    var API_URL = 'https://script.google.com/macros/s/AKfycbyvjG0sKZnQ_RZz1f5WoNeI_m52rebQT2VLPdvnm5jBXPgrykBbNxY3GhIe9EeNZ6dQOA/exec';
    var TOKEN   = 'df-rec-7gljy_kPxnAmM0FgJ87lGf0A';
    var SALES_MAP = { natsukawa:'夏川', abe:'阿部', oyama:'大山', yoshida:'吉田', kenjo:'見城', okinaka:'沖中', mori:'森', nishio:'西尾', suzuking:'鈴木' };
    var PAYLOAD_SCHEMA_VERSION = 2;
    // ==========================================================================

    var SALES_KEY = new URLSearchParams(location.search).get('u') || '';
    var SALES_NAME = SALES_MAP[SALES_KEY] || '';

    var stream=null, recorder=null, mimeType='';
    var sessionId='', startedAt=null, stoppedAt=null, dealName='';
    var seq=0, acked=0, conflictCount=0, pending=new Set();
    var recording=false, userStopped=false, finalizing=false;
    // v0.6.4：finalize の単一飛行（2往復＝doFinalize と C1 maybeFinalizePending の同時POSTを抑止し lock_unavailable を根絶）
    var finalizePostInFlight=false;   // finalize POST が1本でも飛行中か（doFinalize/maybeFinalizePending 共通ガード）
    var primaryFinalizePosted=false;  // 一次finalize(doFinalize)を1回以上POST済みか（初回waitループ中はC1の自動再finalizeを抑止）
    var wakeLock=null, timerId=null, db=null;
    var cycleTimer=null, SEG_MS=30000, interrupted=false;

    // A：時刻契約
    var segments=[], interruptions=[], curSeg=null, curInterruption=null;
    var pendingBlobs={};        // #4：seq->{blob,segRec} 変換前Blob参照（変換失敗でも喪失しない）
    var intentPersisted=false;  // #3：finalize intentを端末に保存できたか

    // G：watchdog
    var lastDataAvailableAt=0, lastServerAckAt=0, oldestPendingAt=0, watchdogTimer=null;
    var captureStallStrikes=0, uploadStallStrikes=0;
    // v0.7.2：capture stall＝40s×1ストライク×10s tick＝最悪約50秒で検知（旧60s×2×15s＝約90秒）。
    //   誤検知のコストは「flush→自動再開」の一瞬に下がった（自動再開＋中断スパン整形が後始末する）ので早め倒しに変更。
    var CAPTURE_STALL_MS=40000, UPLOAD_STALL_MS=90000, WATCHDOG_INTERVAL_MS=10000;
    // v0.7.2：中断の自動再開（stall-resilience）。mute猶予／自動getUserMedia再取得のバックオフ／pending固着の自己回復。
    var MUTE_GRACE_MS=5000, AUTO_RESUME_BASE_MS=1500, AUTO_RESUME_MAX_MS=15000, AUTO_RESUME_STUCK_MS=45000;
    var muteGraceTimer=null, autoResumeTimer=null, autoResumeDelay=AUTO_RESUME_BASE_MS, autoResumeInFlight=false, autoResumeStartedAt=0, resumeGen=0;
    var forceFreshStream=false;   // v0.7.2：捕捉死系の中断（stall/ended/mute超過/audiosession）は「liveに見える」旧トラックも信用せず必ず取り直す
    var FINALIZE_TIMEOUT_MS=90000; // v0.6.5：finalize POSTがsettleしない(blackhole)ときの上限。超過でabort→ラッチ解放＋再試行（サーバ冪等なので安全）

    var $=function(id){ return document.getElementById(id); };

    (function(){
      var errs=[];
      if(API_URL.indexOf('PASTE_')===0) errs.push('API_URL が未設定です（GASのウェブアプリURLを貼ってください）');
      if(TOKEN.indexOf('CHANGE')>=0 || TOKEN.length<12) errs.push('TOKEN が弱い/初期値です（Code.gsのUPLOAD_TOKENと同じ強い文字列にしてください）');
      if(errs.length){ $('cfgCard').classList.remove('hidden'); $('cfgCard').innerHTML='⚠️ セットアップ未完了<br>'+errs.join('<br>'); }
      if(SALES_NAME){ $('salesLine').innerHTML='担当：<b>'+SALES_NAME+'</b>'; }
      else { $('salesLine').innerHTML='<span style="color:#ff8f00">⚠️ 営業が未指定です（URL末尾の <b>?u=</b> を確認してください）</span>'; }
    })();

    // ===== 時刻ユーティリティ =====
    function nowISO(){ return new Date().toISOString(); }
    function mono(){ try{ return { timeOrigin: performance.timeOrigin, now: performance.now() }; }catch(e){ return null; } }

    // ===== IndexedDB（pending=chunk再送／ctrl=finalize intent）=====
    function openDB(){ return new Promise(function(res){
      var settled=false; var done=function(v){ if(!settled){ settled=true; res(v); } };
      try{ var r=indexedDB.open('rec_queue',3);
        r.onupgradeneeded=function(e){
          var d=e.target.result;
          if(!d.objectStoreNames.contains('pending')) d.createObjectStore('pending',{keyPath:'key'});
          if(!d.objectStoreNames.contains('ctrl')) d.createObjectStore('ctrl',{keyPath:'key'});
        };
        r.onblocked=function(){ toast('別タブで古い録音画面が開いています。閉じてください（この画面は自動再送が制限されます）'); done(null); }; // #10：初期化を止めない（永続再送は制限）
        r.onsuccess=function(e){ var d=e.target.result; try{ d.onversionchange=function(){ d.close(); }; }catch(_){}; done(d); };
        r.onerror=function(){ done(null); };
      }catch(e){ done(null); } }); }
    function qPut(rec){ return new Promise(function(res){ if(!db)return res(false);
      try{ var tx=db.transaction('pending','readwrite'); tx.objectStore('pending').put(rec); tx.oncomplete=function(){res(true);}; tx.onerror=function(){res(false);}; tx.onabort=function(){res(false);}; }catch(e){res(false);} }); }
    function qDel(s){ return new Promise(function(res){ if(!db)return res();
      try{ var tx=db.transaction('pending','readwrite'); tx.objectStore('pending').delete(s); tx.oncomplete=function(){res();}; tx.onerror=function(){res();}; }catch(e){res();} }); }
    function qAll(){ return new Promise(function(res){ if(!db)return res([]);
      try{ var tx=db.transaction('pending','readonly'); var rq=tx.objectStore('pending').getAll(); rq.onsuccess=function(){res(rq.result||[]);}; rq.onerror=function(){res([]);}; }catch(e){res([]);} }); }
    // ctrl store（finalize intent）— C2：成否をboolで返す
    function cPut(rec){ return new Promise(function(res){ if(!db)return res(false);
      try{ var tx=db.transaction('ctrl','readwrite'); tx.objectStore('ctrl').put(rec); tx.oncomplete=function(){res(true);}; tx.onerror=function(){res(false);}; tx.onabort=function(){res(false);}; }catch(e){res(false);} }); }
    function cDel(k){ return new Promise(function(res){ if(!db)return res();
      try{ var tx=db.transaction('ctrl','readwrite'); tx.objectStore('ctrl').delete(k); tx.oncomplete=function(){res();}; tx.onerror=function(){res();}; }catch(e){res();} }); }
    function cAll(){ return new Promise(function(res){ if(!db)return res([]);
      try{ var tx=db.transaction('ctrl','readonly'); var rq=tx.objectStore('ctrl').getAll(); rq.onsuccess=function(){res(rq.result||[]);}; rq.onerror=function(){res([]);}; }catch(e){res([]);} }); }
    // v0.6.5c（Codex adversarial#v065-high1）：cAll は障害でも [] を返すため「確定的に空」と「読取障害」を区別できない。
    //   retry継続判定用に、DB未接続/例外/request失敗を null（＝不明）で返す版を用意する（空配列[]＝確定的に空とは別物）。
    function cAllOrNull(){ return new Promise(function(res){ if(!db)return res(null);
      try{ var tx=db.transaction('ctrl','readonly'); var rq=tx.objectStore('ctrl').getAll(); rq.onsuccess=function(){res(rq.result||[]);}; rq.onerror=function(){res(null);}; }catch(e){res(null);} }); }

    // ===== GASへの送信 =====
    function postJSON(payload, signal){
      payload.token = TOKEN;
      if(payload.payloadSchemaVersion==null) payload.payloadSchemaVersion = 1;  // H7：欠落＝旧版(v1)として扱う（新payloadは明示的に2を付与済み）
      var opts = { method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body: JSON.stringify(payload), redirect:'follow' };
      if(signal) opts.signal = signal;  // v0.6.5：finalizeはAbortタイムアウトを渡す（hung fetchでラッチが永久固定するのを防ぐ）
      return fetch(API_URL, opts).then(function(r){ return r.json(); });
    }
    // v0.6.5：finalize専用POST（AbortController＋期限）。期限超過でabort→rejectし、呼び出し側の.catchでラッチ解放＋再試行させる。
    function postFinalizeJSON(fp){
      var ctrl = ('AbortController' in window) ? new AbortController() : null;
      var to = ctrl ? setTimeout(function(){ try{ ctrl.abort(); }catch(e){} }, FINALIZE_TIMEOUT_MS) : null;
      return postJSON(fp, ctrl && ctrl.signal).then(function(r){ if(to) clearTimeout(to); return r; }, function(e){ if(to) clearTimeout(to); throw e; });
    }

    // ===== ユーティリティ =====
    function pad2(n){ return (n<10?'0':'')+n; }
    function fmtTime(ms){ var s=Math.floor(ms/1000); return pad2(Math.floor(s/60))+':'+pad2(s%60); }
    function toast(m){ var t=$('toast'); t.textContent=m; t.classList.remove('hidden'); clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.add('hidden'); },2800); }
    function cryptoRandHex(nBytes){
      try{ var a=new Uint8Array(nBytes); (window.crypto||window.msCrypto).getRandomValues(a); var s=''; for(var i=0;i<a.length;i++){ var h=a[i].toString(16); if(h.length<2)h='0'+h; s+=h; } return s; }
      catch(e){ var f=Date.now().toString(16); for(var j=0;j<4;j++) f+=Math.random().toString(16).slice(2,6); return f.slice(0, Math.max(12, nBytes*2)); }  // C18：fallbackも十分な長さを確保
    }
    function blobToB64(blob){ return new Promise(function(res,rej){ var fr=new FileReader(); fr.onload=function(){ var s=fr.result; res(s.slice(s.indexOf(',')+1)); }; fr.onerror=rej; fr.readAsDataURL(blob); }); }
    function pickMime(){ var c=['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/mpeg']; for(var i=0;i<c.length;i++){ try{ if(window.MediaRecorder && MediaRecorder.isTypeSupported(c[i])) return c[i]; }catch(e){} } return ''; }
    function updateProgress(){ $('progress').textContent='送信済み '+acked+' / '+seq+' チャンク'+(pending.size?'（再送待ち '+pending.size+'）':'')+(conflictCount?'（競合 '+conflictCount+'）':''); }

    // pending管理（M17：oldestPendingAtで滞留判定）
    function addPending(s){ pending.add(s); if(oldestPendingAt===0) oldestPendingAt=Date.now(); }
    // C1：最後のchunkが捌けた瞬間に再finalizeを起動。ただし v0.6.4：一次finalizeをまだPOSTしていない初回waitループ中は起動しない
    // （直後に doFinalize が走るため二重POST＝lock競合になる）。一次POST後の遅延chunk合流のときだけ maybeFinalizePending を呼ぶ。
    function removePending(s){ pending.delete(s); if(pending.size===0){ oldestPendingAt=0; clearUploadStallWarning(); if(finalizing && primaryFinalizePosted && !finalizePostInFlight) maybeFinalizePending(); } }

    // ===== Wake Lock =====
    function requestWake(){ if(!('wakeLock' in navigator)){ $('wakeNote').classList.remove('hidden'); return; }
      navigator.wakeLock.request('screen').then(function(wl){ wakeLock=wl; wakeLock.addEventListener('release',function(){ wakeLock=null; }); }).catch(function(){ $('wakeNote').classList.remove('hidden'); }); }
    function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }

    // ===== M16/v0.7.2：audio track の mute/ended 監視（着信・Siri・音声セッション中断の主要信号）=====
    //   mute は一過性（Siri・経路切替）が多い→MUTE_GRACE_MS だけ様子見し、unmute なら無傷復帰（recorderは止めない）。
    //   猶予を超えて muted のままなら中断化→自動再開（fresh getUserMedia）。ended は即中断化。
    function attachTrackWatch(st){
      try{ st.getAudioTracks().forEach(function(t){
        t.onmute=function(){
          if(!recording || userStopped || interrupted || muteGraceTimer) return;
          var mutedAtISO=nowISO();
          muteGraceTimer=setTimeout(function(){
            muteGraceTimer=null;
            if(recording && !userStopped && !interrupted && t.muted){
              markInterrupt('track_mute','audio_track_muted_over_'+Math.round(MUTE_GRACE_MS/1000)+'s', mutedAtISO);
            }
          }, MUTE_GRACE_MS);
        };
        t.onunmute=function(){ if(muteGraceTimer){ clearTimeout(muteGraceTimer); muteGraceTimer=null; } };
        t.onended=function(){ if(muteGraceTimer){ clearTimeout(muteGraceTimer); muteGraceTimer=null; } if(recording && !userStopped) markInterrupt('track_ended','audio_track_ended'); };
      }); }catch(e){}
    }

    // ===== チャンク送信（B：per-chunk 観測時刻）=====
    function handleData(e){
      if(!e.data || e.data.size===0) return;
      var s=seq++; addPending(s); updateProgress();
      // v0.7.2：dataは「それを生んだrecorder自身のセグメント」に紐付ける。中断→自動再開後に旧recorderの遅延flushが
      //   新curSegへ誤紐付けされると、録音区間の二重計上（overlapping_intervals＝終端incomplete）や取り違えが起きるため。
      var segRec=(e && e.target && e.target._segRec) || curSeg;
      if(segRec && segRec.seq!=null) segRec=null;   // 同一セグメント2発目のdata（想定外）＝区間を二重計上しない（chunk送信はする）
      if(segRec){
        segRec.seq=s; segRec.dataAvailableAt=nowISO(); segRec.monotonicData=mono();
        segRec.blobEventTimecode=(typeof e.timecode==='number')?e.timecode:null; // セッション時刻軸には使わない
        segRec.estDurationMs=estSegDurationMs(segRec);
        segments.push(segRec);
      }
      lastDataAvailableAt=Date.now(); captureStallStrikes=0;
      pendingBlobs[s]={ blob:e.data, segRec:segRec };   // #4：変換前にBlob参照を保持（変換失敗でも喪失しない）
      convertAndSend(s);
    }
    // #4：Blob→Base64変換を捕捉付きで実行。失敗時はBlobを保持したまま再試行し、seqはpendingに残す（finalizeを完全扱いにしない）
    function convertAndSend(s){
      var rec=pendingBlobs[s]; if(!rec) return;
      var segRec=rec.segRec;
      blobToB64(rec.blob).then(function(b64){
        delete pendingBlobs[s]; // 変換成功＝以降は既存の再送キュー(IndexedDB)がバイトを担保
        return sendChunk({
          action:'chunk', payloadSchemaVersion:PAYLOAD_SCHEMA_VERSION,
          sessionId:sessionId, seq:s, mimeType:mimeType, u:SALES_KEY, dealName:dealName, dataB64:b64, clientSha256:null,
          obs: segRec ? { segmentStartRequestedAt:segRec.segmentStartRequestedAt, recorderStartObservedAt:segRec.recorderStartObservedAt,

        prevEnd=Math.max(prevEnd, e);
        if(!(e>s)){ it.coverageAdjusted='zeroed'; it.resumedAt=it.detectedAt; out.push(it); return; }   // 実質0幅＝加算0で記録だけ残す
        // [s,e] から録音∪ U を差し引く → 残った死にスパンを emit（複数に割れたら part 分割）
        var holes=[], cur=s;
        for(var i=0;i<U.length;i++){
          var a=U[i][0], b=U[i][1];
          if(b<=cur) continue;
          if(a>=e) break;
          if(a>cur) holes.push([cur, Math.min(a,e)]);
          cur=Math.max(cur,b);
          if(cur>=e) break;
        }
        if(cur<e) holes.push([cur,e]);
        var kept=holes.filter(function(h){ return h[1]-h[0]>=DUST; });
        if(!kept.length){ it.coverageAdjusted='zeroed'; it.resumedAt=it.detectedAt; out.push(it); return; }
        kept.forEach(function(h,idx){
          var en=baseEntry(it);
          en.detectedAt=new Date(h[0]).toISOString(); en.resumedAt=new Date(h[1]).toISOString();
          en.coverageAdjusted=true; en.part=(kept.length>1)?((idx+1)+'/'+kept.length):null;
          out.push(en);
        });
      });
      return out;
    }
    // __V072_PURE_END__
    function buildFinalizePayload(){
      var caps=segments.map(function(s){ return { seq:s.seq, startedAtObserved:s.recorderStartObservedAt||s.segmentStartRequestedAt, stopRequestedAt:s.stopRequestedAt, recorderStopObservedAt:s.recorderStopObservedAt, dataAvailableAt:s.dataAvailableAt, stopReason:s.stopReason }; });
      var adj;
      try{ adj=computeAdjustedInterruptions(caps, interruptions, startedAt?startedAt.toISOString():null, stoppedAt?stoppedAt.toISOString():null); }
      catch(e){ adj=interruptions.map(function(it){ return { detectedAt:it.detectedAt, detectedAtMonotonic:it.detectedAtMonotonic, resumedAt:it.resumedAt, reason:it.reason, detectionSource:it.detectionSource, timingAccuracy:it.timingAccuracy }; }); }   // 整形失敗でも finalize は従来形で必ず出す
      return {
        action:'finalize', payloadSchemaVersion:PAYLOAD_SCHEMA_VERSION,
        sessionId:sessionId, u:SALES_KEY, dealName:dealName,
        sessionStartedAt: startedAt?startedAt.toISOString():null,
        startedAt: startedAt?startedAt.toISOString():null,     // H8：旧サーバ互換（additive）
        sessionStoppedAt: stoppedAt?stoppedAt.toISOString():null,
        endedAt:null,
        mimeType:mimeType, expectedChunks:seq, expectedCoverageMs: computeCoverageMs(),
        captureIntervals: caps,
        interruptions: adj,
        finalizeIntentId: sessionId, clientFinalizedAt: nowISO()
      };
    }
    function computeCoverageMs(){ var sum=0; segments.forEach(function(s){ if(s.estDurationMs) sum+=s.estDurationMs; }); return sum; }
    function finalize(){
      if(finalizing) return; finalizing=true;
      try{ stream && stream.getTracks().forEach(function(t){ t.stop(); }); }catch(e){}
      var fp=buildFinalizePayload();
      $('recLabel').textContent='保存準備中…'; $('stopBtn').disabled=true;
      // C2：finalize intent を「確実に」永続化してから進む（awaitし、失敗は明示）
      cPut({ key:'finalize_'+sessionId, sessionId:sessionId, payload:fp, createdAt:Date.now() }).then(function(stored){
        intentPersisted = !!stored;   // #3：保存可否を記録（showDoneの「閉じてOK/自動再試行」表示をこれで制御）
        if(!stored) showStorageWarning();
        $('recLabel').textContent='アップロード中…';
        var wait=function(tries){
          flushQueue().then(function(){
            $('progress').textContent='アップロード中… 送信済み '+acked+' / '+seq+(pending.size?'（残り '+pending.size+'）':'');
            if(pending.size===0 || tries<=0){ doFinalize(fp); } else { setTimeout(function(){ wait(tries-1); },2000); }
          });
        };
        wait(40);
      });
    }
    function doFinalize(fp){
      if(finalizePostInFlight) return;                    // v0.6.4：単一飛行（別のfinalize POSTが飛行中なら重複POSTしない）
      finalizePostInFlight=true; primaryFinalizePosted=true;
      fp.endedAt=new Date().toISOString();
      postFinalizeJSON(fp).then(function(r){               // v0.6.5：Abort期限付き（hung fetchでラッチ固定を防ぐ）
        finalizePostInFlight=false;
        if(!r || !r.ok){ scheduleFinalizeRetry(); }                    // 通信/lock失敗：intent保持で再試行
        else if(r.retryNeeded===true){ scheduleFinalizeRetry(); }      // #7 stabilizing：遅延chunk合流待ち＝再finalize
        else { finalizeSettled(fp.sessionId); }                        // complete or terminal incomplete：このsessionのintentを消す（他sessionの再試行は止めない＝v0.6.5 high2）
        showDone(r);
      }).catch(function(e){ finalizePostInFlight=false; scheduleFinalizeRetry(); showDone({ok:false,processing:true,error:String(e)}); }); // v0.6.5d：timeout/切断は失敗でなく「処理中」（サーバは継続・retryで確定）
    }

    // H10：finalize 専用リトライ（chunk送信済みでもlock競合/未完なら自動で再finalize）
    var finalizeRetryTimer=null, finalizeRetryDelay=5000, finalizeRetryRounds=0, FINALIZE_RETRY_MAX=20;
    function scheduleFinalizeRetry(){ if(finalizeRetryTimer) return;
      finalizeRetryTimer=setTimeout(function(){ finalizeRetryTimer=null;
        maybeFinalizePending().then(function(){ cAllOrNull().then(function(x){
          // v0.6.5c（Codex adversarial#v065-high1）：x===null＝IndexedDB障害（不明）→安全側で継続。x.length>0＝intent残存→継続。
          //   []＝確定的に空→終了（reset）。無限retry防止に上限を設け、超過したら停止して reopen 再開へ委ねる（timerは背景化で凍結もされる）。
          var keepRetry = (x === null) || (x && x.length > 0);
          if(keepRetry){
            if(finalizeRetryRounds < FINALIZE_RETRY_MAX){ finalizeRetryRounds++; finalizeRetryDelay=Math.min(finalizeRetryDelay*2,60000); scheduleFinalizeRetry(); }
            else { toast('未確定の録音があります。アプリを開き直すと自動で再確定します'); } // 上限到達＝ループ停止（reopen/onlineで再開）
          } else { finalizeRetryDelay=5000; finalizeRetryRounds=0; } // 確定的に空＝正常終了
        }); });
      }, finalizeRetryDelay); }
    // v0.6.5b（Codex adversarial#v065-high2）：あるsessionのfinalize確定(complete/terminal)時、そのsessionのintentだけ消して
    //   retryを再スケジュールする。★retryタイマーを明示clearしない：cAll()はIndexedDB例外でも[]を返すため、[]根拠でclearすると
    //   障害時に他sessionのintent（例：A=stabilizing中にB=complete）のretryを誤って止める（前回high2の残存経路）。
    //   停止は scheduleFinalizeRetry のコールバックの再arm判定（cAllが空なら再armしない＝自然終了）に委ね、空判定を破壊的操作に使わない。
    function finalizeSettled(sessionId){
      cDel('finalize_'+sessionId).then(function(){ scheduleFinalizeRetry(); });
    }

    // H/C1：未完了の finalize intent を、当該セッションの未送信chunkが捌けていれば冪等再送。完全になるまで intent は残す。
    function maybeFinalizePending(){
      if(!db) return Promise.resolve();
      if(finalizePostInFlight) return Promise.resolve();   // v0.6.4：doFinalize等のfinalize POSTが飛行中ならスキップ（重複POST＝lock競合を防ぐ）
      return cAll().then(function(intents){
        if(!intents || !intents.length) return;
        return qAll().then(function(pendings){
          var chain=Promise.resolve();
          intents.forEach(function(intent){ chain=chain.then(function(){
            if(pendings.some(function(p){ return p.sessionId===intent.sessionId; })) return; // chunkが残っている間は待つ
            if(finalizePostInFlight) return;                 // v0.6.4：直前のintent処理が飛行中ならスキップ（単一飛行）
            finalizePostInFlight=true;
            var fp=intent.payload; fp.endedAt=new Date().toISOString();
            return postFinalizeJSON(fp).then(function(r){
              finalizePostInFlight=false;
              if(r && r.ok){
                if(intent.sessionId===sessionId){ showDone(r); }        // v0.6.5d：現在のsessionがretryで確定したらUIを更新（「処理中」表示のまま放置しない）
                if(r.retryNeeded!==true){ return cDel('finalize_'+intent.sessionId); } // #7：complete/terminalは削除・stabilizingのみ保持
              }
            }).catch(function(){ finalizePostInFlight=false; }); // v0.6.5：Abort期限付き
          }); });
          return chain;
        });
      });
    }

    function showDone(r){
      $('recCard').classList.add('hidden'); $('doneCard').classList.remove('hidden');
      // #3：intent保存に失敗しているときは「閉じてOK/自動再試行」を約束しない
      var closeOk = intentPersisted ? '（この画面は閉じてOK）' : '（⚠️ 端末に再送情報を保存できていません。<b>この画面を閉じないでください</b>）';
      var html='';
      if(r && r.ok){
        var complete = r.completionState==='complete';
        var stabilizing = r.retryNeeded===true;   // #7：遅延chunk合流待ち（回復し得る）
        if(complete){ html+='✅ 録音を保存しました（欠落なし）。<br>'; }
        else if(stabilizing){ html+='⏳ 保存しました（一部未到達）。<br>'; }
        else { html+='⚠️ 保存しました（欠落あり・要確認）。<br>'; }
        html+='フォルダ名：<b>'+(r.folderName||'')+'</b><br>';
        html+='保存チャンク数：'+(r.chunkCount||0)+'（30秒ごと）<br>';
        if(r.revision){ html+='版：r'+r.revision+'（'+(r.completionState||'')+'）<br>'; }
        if(stabilizing){
          html+='<span class="warnline">⏳ 未到達のチャンクがあります。電波が戻れば自動で追送・再確定します'+closeOk+'。</span><br>';
        } else if(!complete){
          html+='<span class="warnline">⚠️ 欠落を確定検知';
          if(r.reasonCodes && r.reasonCodes.length){ html+='（理由：'+r.reasonCodes.join(',')+'）'; }
          if(r.missingSeqs && r.missingSeqs.length){ html+='（欠番：'+r.missingSeqs.join(',')+'）'; }
          html+='。自動修復はできません。夏川に連絡してください。</span><br>';
        }
        if(r.conflicts && r.conflicts.length){ html+='<span class="warnline">⚠️ 内容の異なる重複送信を検知（サーバ側で旧データ保持済み・要確認）</span><br>'; }
      } else if(r && (r.retryable || r.processing)){
        // v0.6.5d：lock_unavailable（先行finalizeが長時間処理中）や、クライアントfetchのタイムアウト/切断。
        //   長い録音はサーバ確定に数分かかる＝失敗ではない。録音は端末＋Driveに保持済みで、自動で再確認して確定する。
        html+='<span class="warnline">⏳ サーバで保存処理中です。</span><br>大きい録音（長い商談）は確定に数分かかることがあります。<br>録音は端末とDriveに保持されています。<b>このままお待ちください</b>（自動で再確認して確定します'+closeOk+'）。<br>詳細：'+(r.error||(r.retryable?'lock_unavailable':'timeout'));
      } else {
        html+='<span class="warnline">⚠️ finalizeでエラーが発生しました。</span><br>チャンクはDriveの _sessions に保存済みの可能性があります。';
        html+= intentPersisted ? '<br>この画面を開いたまま、または開き直すと自動で再送を試みます。' : '<br>⚠️ <b>この画面を閉じないでください</b>（端末に再送情報を保存できていません）。';
        html+='<br>夏川に連絡してください。<br>詳細：'+(r && r.error || '不明');
      }
      $('doneMsg').innerHTML=html; $('stopBtn').disabled=false;
    }

    // ===== visibility =====
    document.addEventListener('visibilitychange', function(){
      if(document.visibilityState==='hidden' && recording && !userStopped){
        markInterrupt('visibilitychange_hidden','app_backgrounded_or_screen_off');
      } else if(document.visibilityState==='visible' && recording && !userStopped){
        requestWake();
        if(interrupted){ $('interrupt').classList.remove('hidden'); rushAutoResume(); }   // v0.7.2：前面復帰＝既存バックオフを破棄して即時に自動再開を試す
        else if(recorder && recorder.state==='inactive'){ markInterrupt('visibilitychange_visible_inactive','recorder_inactive_on_resume'); }
      }
    });

    // ===== v0.7.2：iOS Audio Session（対応環境のみ・watchdogより速い即時センサー）=====
    //   iOSは通話/Siri/他アプリのマイク捕捉で音声セッションが 'interrupted' になり、マイクtrackが黙って死ぬことがある
    //  （画面ON・前面でも起きる＝2026-07-22 阿部stallの型）。state変化を即時の中断検知／復帰トリガーに使う。
    try{
      if(navigator.audioSession && navigator.audioSession.addEventListener){
        navigator.audioSession.addEventListener('statechange', function(){
          try{
            var s=navigator.audioSession.state;
            if(s==='interrupted' && recording && !userStopped && !interrupted){
              markInterrupt('audiosession_interrupted','audio_session_state_interrupted');
            } else if(s==='active' && recording && !userStopped && interrupted){
              rushAutoResume();   // 中断解除＝既存バックオフ待ちを破棄して即時に再開を試す
            }
          }catch(e){}
        });
      }
    }catch(e){}

    // ===== ボタン =====
    $('startBtn').addEventListener('click', startRecording);
    $('stopBtn').addEventListener('click', stopRecording);
    $('resumeBtn').addEventListener('click', resumeRecording);
    $('againBtn').addEventListener('click', function(){
      $('deal').disabled=false; $('deal').value='';
      $('doneCard').classList.add('hidden'); $('setupCard').classList.remove('hidden');
      $('time').textContent='00:00'; $('progress').textContent='送信済み 0 / 0 チャンク'; $('netnote').textContent=''; clearUploadStallWarning();
    });

    // 起動時：DB → 未送信chunk flush → 未完了finalize intentの冪等再送（完全になるまで保持）
    openDB().then(function(d){ db=d; return flushQueue(); }).then(function(){ return maybeFinalizePending(); }).then(function(){ cAll().then(function(x){ if(x && x.length) scheduleFinalizeRetry(); }); });
  </script>
</body>
